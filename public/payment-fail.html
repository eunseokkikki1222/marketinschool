<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 실패 - MarketInSchool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; background: #f5f6fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 20px; padding: 48px 40px; text-align: center; max-width: 420px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
    .icon { font-size: 4rem; margin-bottom: 16px; }
    h1 { font-size: 1.6rem; color: #222; margin-bottom: 10px; }
    p { color: #666; font-size: 0.95rem; line-height: 1.6; margin-bottom: 8px; }
    .error-box { background: #fef2f2; border-radius: 12px; padding: 16px; margin: 20px 0; }
    .error-code { font-size: 0.85rem; color: #dc2626; font-weight: 600; margin-bottom: 4px; }
    .error-msg { font-size: 0.9rem; color: #666; }
    .btn { display: inline-block; background: #3b82f6; color: #fff; text-decoration: none; border-radius: 10px; padding: 14px 32px; font-size: 1rem; font-weight: 600; margin-top: 8px; width: 100%; }
    .btn:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">😢</div>
    <h1>결제에 실패했습니다</h1>
    <p>결제 처리 중 문제가 발생했습니다.</p>

    <div class="error-box">
      <div class="error-code" id="error-code">-</div>
      <div class="error-msg" id="error-msg">다시 시도해주세요.</div>
    </div>

    <a class="btn" href="/">🏠 메인으로 돌아가기</a>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const code = params.get('code');
    const msg  = params.get('message');
    if (code) document.getElementById('error-code').textContent = '오류 코드: ' + code;
    if (msg)  document.getElementById('error-msg').textContent = decodeURIComponent(msg);
  </script>
</body>
</html>
